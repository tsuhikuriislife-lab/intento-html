<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intento HTML y CSS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <body class="header">
        <header class="titulo">
        Pokemon Pseudolegendarios
        </header>
    </body>
    <main class="contenedor-tarjeta">
        <article class="tarjeta">
            <header class="header-tarjeta">
                <div class="foto-pokemon"></div>
                <h1>Dragonite</h1>
                <p class="subtitulo">Pokemon Dragón</p>
            </header>
            <section>
                <p>A pesar del tamaño que tiene y de lo pesado que es, puede volar. Es capaz de dar la vuelta al mundo en solo 16 horas.</p>
                <div class="propiedadades">
                    <span class="tag">Volador</span>
                    <span class="tag">Dragon</span>
                    <span class="tag">Balanceado</span>
                </div>
            </section>
            <footer>
                <a href="https://pokemaster.es/dragonite/3/">
                    <button>Pokedex</button>
                </a>
            </footer>
        </article>
